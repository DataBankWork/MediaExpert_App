<h2 mat-dialog-title>
  {{ data ? 'Edytuj produkt' : 'Dodaj produkt' }}
</h2>

  <form [formGroup]="form" (ngSubmit)="save()">
    <mat-dialog-content class="form-container">

      <div>
        <mat-form-field appearance="fill">
          <mat-label>Kod</mat-label>
          <input matInput formControlName="code">
          <mat-error *ngIf="form.get('code')?.hasError('required')">
            Kod jest wymagany
          </mat-error>
        </mat-form-field>
      </div>

      <div>
        <mat-form-field appearance="fill">
          <mat-label>Nazwa</mat-label>
          <input matInput formControlName="name">
          <mat-error *ngIf="form.get('name')?.hasError('required')">
            Nazwa jest wymagana
          </mat-error>
        </mat-form-field>
      </div>

      <div>
        <mat-form-field appearance="fill">
          <mat-label>Cena</mat-label>
          <input matInput type="number" formControlName="price">
          <mat-error *ngIf="form.get('price')?.hasError('required')">
            Cena jest wymagana
          </mat-error>
          <mat-error *ngIf="form.get('price')?.hasError('min')">
            Cena musi być ≥ 0
          </mat-error>
        </mat-form-field>
      </div>

    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button type="button" (click)="close()">Anuluj</button>
      <button mat-raised-button color="primary" type="submit">
        Zapisz
      </button>
    </mat-dialog-actions>
  </form>

<mat-form-field>
  <mat-label>Filter</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Type the product name or code" #input>
</mat-form-field>

<mat-toolbar color="basic">
  <!--Add Button-->
  <button mat-mini-fab matTooltip="Add product" color="primary" (click)="openDialog(ActionType.Create)">
    <mat-icon>add</mat-icon>
  </button>
  <span class="spacer"></span>
  <div>Products</div>
  <span class="spacer"></span>
  <!--Delete Button-->
  <button mat-mini-fab matBadge="{{selection.selected.length}}" matBadgeColor="primary"
          matTooltip="Delete" matBadgePosition="before" color="warn" (click)="delete()">
    <mat-icon>delete</mat-icon>
  </button>

</mat-toolbar>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>


    <!-- Action Column -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Action </th>
      <td mat-cell *matCellDef="let row">
        <div class="button-group">          
          <button mat-mini-fab matTooltip="Edit" color="primary" (click)="openDialog( ActionType.Edit, row.id)">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-mini-fab matTooltip="Copy" color="accent" (click)="openDialog(ActionType.Copy, row.id)">
            <mat-icon>file_copy</mat-icon>
          </button>

          <button mat-mini-fab matTooltip="Details" color="primary" (click)="productInfo(row.id)">
            <mat-icon>info</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let row"> {{row.name}} </td>
    </ng-container>

    <!-- Code Column -->
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Code </th>
      <td mat-cell *matCellDef="let row"> {{row.code}} </td>
    </ng-container>

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Id </th>
      <td mat-cell *matCellDef="let row"> {{row.id}} </td>
    </ng-container>

    <!-- Price Column -->
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
      <td mat-cell *matCellDef="let row"> {{row.price | currency:'PLN ':'symbol':'1.2-2'}} </td>
    </ng-container>

    <!-- Checkbox Column -->
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef>
        <mat-checkbox (change)="$event ? masterToggle() : null"
                      [checked]="selection.hasValue() && isAllSelected()"
                      [indeterminate]="selection.hasValue() && !isAllSelected()">
        </mat-checkbox>
      </th>
      <td mat-cell *matCellDef="let row">
        <mat-checkbox (click)="$event.stopPropagation()"
                      (change)="$event ? selection.toggle(row) : null"
                      [checked]="selection.isSelected(row)">
        </mat-checkbox>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
    </tr>
  </table>

  <mat-paginator [length]="totalItems"
                 [pageSize]="pageSize"
                 [pageSizeOptions]="[3, 5, 10, 20, 50, 100]"
                 (page)="onPageChange($event)"
                 aria-label="Wybierz stronę">
  </mat-paginator>
</div>
